services:
  auth-service:
    image: ${DOCKER_IMAGE}:IMAGE_TAG_PLACEHOLDER
    container_name: ${AUTH_SERVICE_NAME}
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    env_file:
      - .env
    networks:
      - mumulbo-network
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7.2-alpine
    container_name: ${AUTH_SERVICE_NAME}-redis
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - mumulbo-network
    restart: unless-stopped

networks:
  mumulbo-network:
    external: true
    driver: bridge
    name: ${MMB_DOCKER_NETWORK}