server:
  port: ${AUTH_SERVICE_PORT}

spring:
  application:
    name: ${AUTH_SERVICE_NAME}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile, email

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

common:
  service:
    member:
      host: ${MEMBER_SERVICE_HOST}
      port: ${MEMBER_SERVICE_PORT}

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expire-time: ${ACCESS_TOKEN_EXPIRATION}
  refresh-token-expire-time: ${REFRESH_TOKEN_EXPIRATION}

logging:
  level:
    org.hibernate.SQL: debug
