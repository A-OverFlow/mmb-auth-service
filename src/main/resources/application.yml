server:
  port: ${AUTH_SERVICE_PORT:8081}

spring:
  application:
    name: ${AUTH_SERVICE_NAME:mmb-auth-service}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile, email

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

common:
  service:
    member:
      host: ${MEMBER_SERVICE_HOST:localhost}
      port: ${MEMBER_SERVICE_PORT:8082}

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expire-time: ${ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expire-time: ${REFRESH_TOKEN_EXPIRATION:604800000}

logging:
  level:
    org.hibernate.SQL: debug
