server:
  port: 8083

spring:
  application:
    name: auth-service

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: asdf
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile, email

  data:
    redis:
      host: localhost
      port: 6379

common:
  service:
    member:
      host: localhost
      port: 8081

jwt:
  secret : asdf
  access-token-expire-time : 30000
  refresh-token-expire-time : 72000

logging:
  level:
    org.hibernate.SQL: debug